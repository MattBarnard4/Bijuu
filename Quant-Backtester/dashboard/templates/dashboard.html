<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quant Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>QuantDashboard</h1>
        <p>ICT / Quant Hybrid Strategy • UI shell for backtest analytics</p>
      </div>
      <div class="status-pill">Dashboard ready</div>
    </header>

    <section class="section">
      <div class="section-header">
        <span>PERFORMANCE & TRADE QUALITY</span>
      </div>
      <div class="cards-grid" id="performance-cards"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <span>DRAWDOWN & RISK</span>
      </div>
      <div class="cards-grid" id="risk-cards"></div>
    </section>

    <section class="lower-grid">
      <div class="panel large-panel">
        <div class="panel-title">Equity Curve</div>
        <div id="equity-chart"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Run Summary</div>
        <div id="run-summary" class="summary-block"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Recent Trades</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Entry Time</th>
                <th>Side</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>PnL</th>
                <th>R</th>
              </tr>
            </thead>
            <tbody id="trades-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
